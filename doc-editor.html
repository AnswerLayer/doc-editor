<!DOCTYPE html>
<html>
<head>
  <title>Doc Editor</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
    .toolbar { padding: 10px; background: #333; color: white; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .toolbar button { padding: 8px 16px; cursor: pointer; border: none; border-radius: 4px; background: #4CAF50; color: white; font-size: 14px; }
    .toolbar button:hover { background: #45a049; }
    .toolbar button.secondary { background: #2196F3; }
    .toolbar button.secondary:hover { background: #1976D2; }
    .toolbar button.accent { background: #FF5722; }
    .toolbar button.accent:hover { background: #E64A19; }
    .toolbar button:disabled { background: #666; cursor: not-allowed; }
    .toolbar select { padding: 6px 10px; border-radius: 4px; border: none; font-size: 13px; }
    .container { display: flex; flex: 1; overflow: hidden; }
    .pane { flex: 1; overflow: auto; }
    .pane.hidden { display: none; }
    .pane.editor-pane { padding: 0; display: flex; flex-direction: column; }
    .pane.editor-pane.hidden { display: none; }
    #editor { flex: 1; border: none; font-family: Monaco, 'Courier New', monospace; font-size: 13px; line-height: 1.6; resize: none; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
    #preview { background: white; border-left: 1px solid #ddd; padding: 20px; }
    #preview h1 { border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
    #preview h2 { color: #333; margin-top: 30px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
    #preview p { margin-bottom: 15px; line-height: 1.6; }
    #preview hr { margin: 30px 0; border: none; border-top: 1px solid #ddd; }
    #preview strong { color: #333; }
    .preview-pane { padding: 0; }
    #styled-preview { width: 100%; height: 100%; border: none; background: white; }
    .status { color: #4CAF50; font-size: 14px; }
    .status.error { color: #f44336; }
    .status.subtle { color: #cbd5e1; }
    .file-info { color: #aaa; font-size: 12px; margin-left: auto; }
    .mode-badge { background: #555; padding: 4px 8px; border-radius: 4px; font-size: 12px; text-transform: uppercase; }
    .mode-badge.html { background: #E44D26; }
    .mode-badge.markdown { background: #083fa1; }
    .mode-badge.template { background: #6B46C1; }
    .divider { width: 1px; height: 24px; background: #555; }
    .comments-pane { width: 340px; border-left: 1px solid #ddd; background: #f8fafc; display: flex; flex-direction: column; }
    .comments-header { padding: 16px; border-bottom: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 10px; }
    .comments-header h2 { font-size: 14px; color: #0f172a; }
    .selection-card { padding: 12px; background: white; border: 1px solid #dbe3ee; border-radius: 8px; }
    .selection-card strong { display: block; font-size: 11px; letter-spacing: 0.04em; color: #475569; text-transform: uppercase; margin-bottom: 8px; }
    .selection-card p { font-size: 13px; line-height: 1.5; color: #0f172a; white-space: pre-wrap; max-height: 180px; overflow: auto; }
    .selection-card.empty p { color: #64748b; }
    .comment-form { display: flex; flex-direction: column; gap: 10px; }
    .comment-form textarea { min-height: 88px; resize: vertical; padding: 10px 12px; border-radius: 8px; border: 1px solid #cbd5e1; font: inherit; font-size: 13px; line-height: 1.5; }
    .comment-actions { display: flex; gap: 8px; }
    .comment-actions button { flex: 1; }
    .comments-list { flex: 1; overflow: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .comment-item { background: white; border: 1px solid #dbe3ee; border-radius: 10px; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
    .comment-item.active { border-color: #2563eb; box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.15); }
    .comment-item.stale { border-color: #f59e0b; box-shadow: 0 0 0 1px rgba(245, 158, 11, 0.12); }
    .comment-meta { display: flex; justify-content: space-between; gap: 10px; align-items: center; }
    .comment-meta strong { font-size: 12px; color: #0f172a; }
    .comment-meta span { font-size: 11px; color: #64748b; }
    .comment-state { font-size: 11px; font-weight: 600; color: #b45309; }
    .comment-quote { padding: 10px 12px; background: #eff6ff; border-radius: 8px; font-size: 12px; line-height: 1.5; color: #1e3a8a; white-space: pre-wrap; }
    .comment-body { font-size: 13px; line-height: 1.5; color: #0f172a; white-space: pre-wrap; }
    .comment-buttons { display: flex; gap: 8px; }
    .comment-buttons button { flex: 1; }
    .comment-empty { padding: 24px 16px; text-align: center; color: #64748b; font-size: 13px; }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="mode-badge" id="modeBadge">MD</span>
    <button onclick="saveFile()">Save</button>
    <button onclick="refreshPreview()" class="secondary">Refresh</button>
    <button onclick="togglePreview()" id="toggleBtn" class="secondary">Hide Preview</button>
    <button onclick="toggleEditor()" id="toggleEditorBtn" class="secondary">Hide Text</button>
    <span class="divider"></span>
    <button onclick="generatePDF()" id="pdfBtn" class="accent" style="display:none;">Generate PDF</button>
    <button onclick="generatePNG()" id="pngBtn" class="accent" style="display:none;">Generate PNG</button>
    <button onclick="generateDOCX()" id="docxBtn" class="accent" style="display:none;">Generate DOCX</button>
    <input type="text" id="outputBasename" placeholder="output filename" style="display:none; width: 200px; padding: 6px 10px; border-radius: 4px; border: none; font-size: 13px;">
    <select id="templateSelect" style="display:none;"></select>
    <select id="aiProviderSelect" title="AI provider"></select>
    <select id="aiModelSelect" title="AI model"></select>
    <span class="status subtle" id="aiStatus"></span>
    <span class="status subtle" id="pdfEstimate" style="display:none;"></span>
    <span class="divider" id="pdfDivider" style="display:none;"></span>
    <button onclick="copyToClipboard()" class="secondary">Copy Text</button>
    <span class="status" id="status"></span>
    <span class="file-info" id="fileInfo"></span>
  </div>
  <div class="container">
    <div class="pane editor-pane">
      <textarea id="editor" oninput="onEditorInput()" onmouseup="handleSelectionChange()" onkeyup="handleSelectionChange()" onselect="handleSelectionChange()" onblur="handleEditorBlur()"></textarea>
    </div>
    <div class="pane" id="preview"></div>
    <div class="pane preview-pane hidden" id="styledPreviewPane">
      <iframe id="styled-preview"></iframe>
    </div>
    <aside class="comments-pane">
      <div class="comments-header">
        <h2>Comments</h2>
        <div class="selection-card empty" id="selectionCard">
          <strong>Current Selection</strong>
          <p id="selectionPreview">Select text in the editor to attach a comment.</p>
        </div>
        <div class="comment-form">
          <textarea id="commentInput" placeholder="Leave a comment for the selected text. Example: tighten this paragraph and make the tone more direct."></textarea>
          <div class="comment-actions">
            <button type="button" class="secondary" onclick="addComment()">Add Comment</button>
            <button type="button" onclick="applyActiveCommentWithAI()" id="applySelectionBtn">AI Apply</button>
          </div>
        </div>
      </div>
      <div class="comments-list" id="commentsList">
        <div class="comment-empty">No comments yet.</div>
      </div>
    </aside>
  </div>
  <script>
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const styledPreviewPane = document.getElementById('styledPreviewPane');
    const styledPreview = document.getElementById('styled-preview');
    const status = document.getElementById('status');
    const modeBadge = document.getElementById('modeBadge');
    const pdfBtn = document.getElementById('pdfBtn');
    const templateSelect = document.getElementById('templateSelect');
    const aiProviderSelect = document.getElementById('aiProviderSelect');
    const aiModelSelect = document.getElementById('aiModelSelect');
    const aiStatus = document.getElementById('aiStatus');
    const pdfEstimate = document.getElementById('pdfEstimate');
    const pdfDivider = document.getElementById('pdfDivider');
    const fileInfo = document.getElementById('fileInfo');
    const selectionCard = document.getElementById('selectionCard');
    const selectionPreview = document.getElementById('selectionPreview');
    const commentInput = document.getElementById('commentInput');
    const commentsList = document.getElementById('commentsList');
    const applySelectionBtn = document.getElementById('applySelectionBtn');

    marked.setOptions({
      gfm: true,
      breaks: true
    });

    // Get params from URL
    const params = new URLSearchParams(window.location.search);
    const filePath = params.get('file');
    const templateParam = params.get('template');
    const templateFlagValues = new Set(['', 'true', '1', 'yes']);
    const explicitTemplateName = (
      templateParam &&
      !templateFlagValues.has(templateParam.toLowerCase())
    ) ? (templateParam.toLowerCase().endsWith('.html') ? templateParam : `${templateParam}.html`) : null;
    const fileName = filePath ? filePath.split('/').pop() : 'document';

    // Determine mode
    const isHtmlMode = filePath && filePath.toLowerCase().endsWith('.html');
    const isTemplateMode = filePath && filePath.toLowerCase().endsWith('.md') && params.has('template');
    const isMarkdownMode = filePath && filePath.toLowerCase().endsWith('.md') && !isTemplateMode;

    // Output paths - derived from basename input
    const fileDir = filePath ? filePath.substring(0, filePath.lastIndexOf('/') + 1) : '';
    const defaultBasename = filePath ? filePath.split('/').pop().replace(/\.(html|md)$/i, '') : 'output';
    const outputBasenameInput = document.getElementById('outputBasename');
    const defaultPdfTemplate = explicitTemplateName || 'midas-branded.html';
    let estimateTimeout = null;
    let estimateRequestId = 0;
    const commentStorageKey = `doc-editor-comments:${filePath || 'unsaved'}`;
    let currentSelection = null;
    let lastEditorSelection = null;
    let comments = [];
    let activeCommentId = comments[0]?.id || null;
    let pendingApplyCommentId = null;
    let aiProviders = [];
    let commentsLoaded = false;
    let pendingCommentsSave = null;
    let previewSelectionFrame = null;
    let previewSelectionListener = null;
    let styledPreviewObjectUrl = null;

    function getOutputPath(ext) {
      const basename = outputBasenameInput.value || defaultBasename;
      return fileDir + basename + ext;
    }

    // Set up mode UI
    const pngBtn = document.getElementById('pngBtn');
    const docxBtn = document.getElementById('docxBtn');

    if (isHtmlMode) {
      modeBadge.textContent = 'HTML';
      modeBadge.classList.add('html');
      preview.classList.add('hidden');
      styledPreviewPane.classList.remove('hidden');
      pdfBtn.style.display = 'inline-block';
      pngBtn.style.display = 'inline-block';
      docxBtn.style.display = 'inline-block';
      outputBasenameInput.style.display = 'inline-block';
      outputBasenameInput.value = defaultBasename;
      pdfDivider.style.display = 'inline-block';
    } else if (isTemplateMode) {
      modeBadge.textContent = 'PDF';
      modeBadge.classList.add('template');
      preview.classList.add('hidden');
      styledPreviewPane.classList.remove('hidden');
      pdfBtn.style.display = 'inline-block';
      pngBtn.style.display = 'inline-block';
      docxBtn.style.display = 'inline-block';
      outputBasenameInput.style.display = 'inline-block';
      outputBasenameInput.value = defaultBasename;
      templateSelect.style.display = 'inline-block';
      pdfEstimate.style.display = 'inline-block';
      pdfDivider.style.display = 'inline-block';
      loadTemplates();
    } else {
      modeBadge.textContent = 'MD';
      modeBadge.classList.add('markdown');
      if (filePath && filePath.toLowerCase().endsWith('.md')) {
        pdfEstimate.style.display = 'inline-block';
      }
    }

    if (filePath) {
      fileInfo.textContent = filePath;
    }

    renderComments();
    handleSelectionChange();
    loadAiProviders();

    // Load templates list
    function loadTemplates() {
      fetch('/templates')
        .then(r => r.json())
        .then(templates => {
          templateSelect.innerHTML = '';
          templates.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t;
            opt.textContent = t.replace('.html', '');
            if (t === defaultPdfTemplate) {
              opt.selected = true;
            }
            templateSelect.appendChild(opt);
          });

          if (templates.includes(defaultPdfTemplate)) {
            templateSelect.value = defaultPdfTemplate;
          } else if (templates.length > 0) {
            templateSelect.value = templates.includes('midas-branded.html')
              ? 'midas-branded.html'
              : templates[0];
          }

          updatePreview();
          schedulePdfEstimate();
        });
    }

    function loadAiProviders() {
      fetch('/ai-models')
        .then(r => r.ok ? r.json() : r.text().then(text => Promise.reject(new Error(text || 'Failed to load AI providers'))))
        .then(providers => {
          aiProviders = Array.isArray(providers) ? providers : [];
          renderAiProviderOptions();
        })
        .catch(error => {
          aiStatus.textContent = error.message;
        });
    }

    function renderAiProviderOptions() {
      aiProviderSelect.innerHTML = '';

      aiProviders.forEach(provider => {
        const opt = document.createElement('option');
        opt.value = provider.id;
        opt.textContent = provider.available ? provider.label : `${provider.label} (Unavailable)`;
        opt.disabled = !provider.available;
        aiProviderSelect.appendChild(opt);
      });

      const firstAvailable = aiProviders.find(provider => provider.available);
      if (firstAvailable) {
        aiProviderSelect.value = firstAvailable.id;
      }

      renderAiModelOptions();
    }

    function renderAiModelOptions() {
      const provider = aiProviders.find(item => item.id === aiProviderSelect.value) || aiProviders[0];
      aiModelSelect.innerHTML = '';

      if (!provider) {
        aiStatus.textContent = 'No AI providers detected';
        return;
      }

      (provider.models || []).forEach(model => {
        const opt = document.createElement('option');
        opt.value = model.id;
        opt.textContent = model.label;
        aiModelSelect.appendChild(opt);
      });

      if (!provider.models || provider.models.length === 0) {
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = 'Default';
        aiModelSelect.appendChild(opt);
      }

      aiStatus.textContent = provider.detail || '';
    }

    // Load file content
    if (!filePath) {
      editor.value = `# Doc Editor

Usage:
- Markdown: ?file=/path/to/file.md
- HTML: ?file=/path/to/file.html
- PDF (template mode): ?file=/path/to/file.md&template=answerlayer-branded.html

In template mode, edit plain markdown and generate styled PDFs.`;
      updatePreview();
      bootstrapComments();
    } else {
      fetch('/load?file=' + encodeURIComponent(filePath))
        .then(r => r.ok ? r.text() : Promise.reject('File not found'))
        .then(text => {
          editor.value = text;
          updatePreview();
          schedulePdfEstimate();
          renderComments();
          handleSelectionChange();
          document.title = 'Doc Editor - ' + fileName;
          bootstrapComments();
        })
        .catch(err => {
          editor.value = '# Error loading file\n\n' + err;
          updatePreview();
          schedulePdfEstimate();
          renderComments();
          handleSelectionChange();
          bootstrapComments();
        });
    }

    let previewTimeout = null;
    function onEditorInput() {
      clearTimeout(previewTimeout);
      previewTimeout = setTimeout(updatePreview, 300);
      schedulePdfEstimate();
      syncCommentsAfterEdit();
      handleSelectionChange();
    }

    function updatePreview() {
      if (isHtmlMode) {
        updateHtmlPreview();
      } else if (isTemplateMode) {
        updateTemplatePreview();
      } else {
        preview.innerHTML = marked.parse(editor.value);
      }
    }

    function getEstimateTemplate() {
      return isTemplateMode ? (templateSelect.value || defaultPdfTemplate) : defaultPdfTemplate;
    }

    function schedulePdfEstimate() {
      if (!isMarkdownMode && !isTemplateMode) {
        return;
      }

      clearTimeout(estimateTimeout);
      estimateTimeout = setTimeout(updatePdfEstimate, 450);
    }

    function updatePdfEstimate() {
      if (!isMarkdownMode && !isTemplateMode) {
        return;
      }

      const requestId = ++estimateRequestId;
      const template = getEstimateTemplate();
      pdfEstimate.textContent = 'Estimating PDF pages...';

      fetch('/estimate-pdf-pages?template=' + encodeURIComponent(template), {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: editor.value
      })
      .then(r => r.ok ? r.json() : r.text().then(text => Promise.reject(new Error(text || 'Estimate failed'))))
      .then(data => {
        if (requestId !== estimateRequestId) {
          return;
        }

        const label = data.pageCount === 1 ? '1 PDF page' : `${data.pageCount} PDF pages`;
        pdfEstimate.textContent = `Est. ${label}`;
        pdfEstimate.title = `Estimated with ${template.replace('.html', '')}`;
      })
      .catch(() => {
        if (requestId !== estimateRequestId) {
          return;
        }
        pdfEstimate.textContent = 'PDF estimate unavailable';
      });
    }

    function updateHtmlPreview() {
      const blob = new Blob([editor.value], { type: 'text/html' });
      if (styledPreviewObjectUrl) {
        URL.revokeObjectURL(styledPreviewObjectUrl);
      }
      styledPreviewObjectUrl = URL.createObjectURL(blob);
      styledPreview.src = styledPreviewObjectUrl;
    }

    function updateTemplatePreview() {
      const template = templateSelect.value || 'answerlayer-branded.html';
      // Send markdown to server for rendering
      fetch('/render-markdown?template=' + encodeURIComponent(template), {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: editor.value
      })
      .then(r => r.text())
      .then(html => {
        const blob = new Blob([html], { type: 'text/html' });
        if (styledPreviewObjectUrl) {
          URL.revokeObjectURL(styledPreviewObjectUrl);
        }
        styledPreviewObjectUrl = URL.createObjectURL(blob);
        styledPreview.src = styledPreviewObjectUrl;
      })
      .catch(err => {
        console.error('Preview error:', err);
      });
    }

    function refreshPreview() {
      updatePreview();
      showStatus('Preview refreshed');
    }

    function saveFile() {
      if (!filePath) {
        showStatus('No file specified!', true);
        return;
      }
      fetch('/save?file=' + encodeURIComponent(filePath), {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: editor.value
      }).then(r => {
        if (r.ok) {
          showStatus('Saved!');
        } else {
          throw new Error('Save failed');
        }
      }).catch(() => {
        const blob = new Blob([editor.value], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = fileName;
        a.click();
        showStatus('Downloaded (server save failed)', true);
      });
    }

    function generatePDF() {
      if (!filePath) {
        showStatus('No file specified!', true);
        return;
      }

      pdfBtn.disabled = true;
      pdfBtn.textContent = 'Generating...';

      let generateUrl;
      let fetchOptions = { method: 'POST' };

      if (isTemplateMode) {
        // Save markdown first, then generate PDF through template
        const template = templateSelect.value || 'answerlayer-branded.html';
        generateUrl = `/generate-pdf-from-markdown?file=${encodeURIComponent(filePath)}&pdf=${encodeURIComponent(getOutputPath('.pdf'))}&template=${encodeURIComponent(template)}`;
        fetchOptions.headers = { 'Content-Type': 'text/plain' };
        fetchOptions.body = editor.value;
      } else {
        // HTML mode: save then generate
        generateUrl = `/generate-pdf?html=${encodeURIComponent(filePath)}&pdf=${encodeURIComponent(getOutputPath('.pdf'))}`;
        // Save first
        fetch('/save?file=' + encodeURIComponent(filePath), {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: editor.value
        });
      }

      fetch(generateUrl, fetchOptions)
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            const sizeKB = Math.round(data.size / 1024);
            const pageInfo = data.pageCount ? `, ${data.pageCount} ${data.pageCount === 1 ? 'page' : 'pages'}` : '';
            showStatus(`PDF generated (${sizeKB}KB${pageInfo}) - ${data.path}`);
            schedulePdfEstimate();
          } else {
            throw new Error('Generation failed');
          }
        })
        .catch(err => {
          showStatus('PDF generation failed: ' + err.message, true);
        })
        .finally(() => {
          pdfBtn.disabled = false;
          pdfBtn.textContent = 'Generate PDF';
        });
    }

    function generatePNG() {
      if (!filePath) {
        showStatus('No file specified!', true);
        return;
      }

      pngBtn.disabled = true;
      pngBtn.textContent = 'Generating...';

      let generateUrl;
      let fetchOptions = { method: 'POST' };

      if (isTemplateMode) {
        const template = templateSelect.value || 'answerlayer-branded.html';
        generateUrl = `/generate-png-from-markdown?file=${encodeURIComponent(filePath)}&png=${encodeURIComponent(getOutputPath('.png'))}&template=${encodeURIComponent(template)}`;
        fetchOptions.headers = { 'Content-Type': 'text/plain' };
        fetchOptions.body = editor.value;
      } else {
        generateUrl = `/generate-png?html=${encodeURIComponent(filePath)}&png=${encodeURIComponent(getOutputPath('.png'))}`;
        fetch('/save?file=' + encodeURIComponent(filePath), {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: editor.value
        });
      }

      fetch(generateUrl, fetchOptions)
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            const sizeKB = Math.round(data.size / 1024);
            showStatus(`PNG generated (${sizeKB}KB) - ${data.path}`);
          } else {
            throw new Error('Generation failed');
          }
        })
        .catch(err => {
          showStatus('PNG generation failed: ' + err.message, true);
        })
        .finally(() => {
          pngBtn.disabled = false;
          pngBtn.textContent = 'Generate PNG';
        });
    }

    function generateDOCX() {
      if (!filePath) {
        showStatus('No file specified!', true);
        return;
      }

      docxBtn.disabled = true;
      docxBtn.textContent = 'Generating...';

      let generateUrl;
      let fetchOptions = { method: 'POST' };

      if (isTemplateMode) {
        const template = templateSelect.value || 'answerlayer-branded.html';
        generateUrl = `/generate-docx-from-markdown?file=${encodeURIComponent(filePath)}&docx=${encodeURIComponent(getOutputPath('.docx'))}&template=${encodeURIComponent(template)}`;
        fetchOptions.headers = { 'Content-Type': 'text/plain' };
        fetchOptions.body = editor.value;
      } else if (isMarkdownMode) {
        generateUrl = `/generate-docx-from-markdown?file=${encodeURIComponent(filePath)}&docx=${encodeURIComponent(getOutputPath('.docx'))}`;
        fetchOptions.headers = { 'Content-Type': 'text/plain' };
        fetchOptions.body = editor.value;
      } else {
        generateUrl = `/generate-docx?html=${encodeURIComponent(filePath)}&docx=${encodeURIComponent(getOutputPath('.docx'))}`;
        fetch('/save?file=' + encodeURIComponent(filePath), {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: editor.value
        });
      }

      fetch(generateUrl, fetchOptions)
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            const sizeKB = Math.round(data.size / 1024);
            showStatus(`DOCX generated (${sizeKB}KB) - ${data.path}`);
          } else {
            throw new Error('Generation failed');
          }
        })
        .catch(err => {
          showStatus('DOCX generation failed: ' + err.message, true);
        })
        .finally(() => {
          docxBtn.disabled = false;
          docxBtn.textContent = 'Generate DOCX';
        });
    }

    function copyToClipboard() {
      let text;
      if (isHtmlMode) {
        const tmp = document.createElement('div');
        tmp.innerHTML = editor.value;
        text = tmp.textContent || tmp.innerText;
      } else {
        text = editor.value
          .replace(/^#{1,6}\s+/gm, '')
          .replace(/\*\*([^*]+)\*\*/g, '$1')
          .replace(/\*([^*]+)\*/g, '$1')
          .replace(/^---+$/gm, '\n---\n')
          .replace(/^\s*[-*]\s+/gm, '• ');
      }
      navigator.clipboard.writeText(text);
      showStatus('Copied!');
    }

    function togglePreview() {
      const toggleBtn = document.getElementById('toggleBtn');
      if (isHtmlMode || isTemplateMode) {
        styledPreviewPane.classList.toggle('hidden');
        toggleBtn.textContent = styledPreviewPane.classList.contains('hidden') ? 'Show Preview' : 'Hide Preview';
      } else {
        preview.classList.toggle('hidden');
        toggleBtn.textContent = preview.classList.contains('hidden') ? 'Show Preview' : 'Hide Preview';
      }
    }

    function toggleEditor() {
      const editorPane = document.querySelector('.editor-pane');
      const toggleEditorBtn = document.getElementById('toggleEditorBtn');
      editorPane.classList.toggle('hidden');
      toggleEditorBtn.textContent = editorPane.classList.contains('hidden') ? 'Show Text' : 'Hide Text';
    }

    function showStatus(msg, isError = false) {
      status.textContent = msg;
      status.classList.toggle('error', isError);
      setTimeout(() => {
        status.textContent = '';
        status.classList.remove('error');
      }, 4000);
    }

    function loadStoredComments() {
      try {
        const raw = localStorage.getItem(commentStorageKey);
        if (!raw) {
          return [];
        }

        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) {
          return [];
        }

        return parsed.filter(comment => (
          comment &&
          typeof comment.id === 'string' &&
          typeof comment.comment === 'string' &&
          Number.isInteger(comment.start) &&
          Number.isInteger(comment.end)
        ));
      } catch {
        return [];
      }
    }

    function normalizeComments(rawComments) {
      if (!Array.isArray(rawComments)) {
        return [];
      }

      return rawComments.filter(comment => (
        comment &&
        typeof comment.id === 'string' &&
        typeof comment.comment === 'string' &&
        Number.isInteger(comment.start) &&
        Number.isInteger(comment.end)
      )).map(comment => ({
        id: comment.id,
        start: comment.start,
        end: comment.end,
        excerpt: typeof comment.excerpt === 'string' ? comment.excerpt : '',
        comment: comment.comment,
        createdAt: typeof comment.createdAt === 'string' ? comment.createdAt : ''
      }));
    }

    function mergeComments(serverComments, localComments) {
      const mergedById = new Map();

      [...normalizeComments(serverComments), ...normalizeComments(localComments)].forEach(comment => {
        const existing = mergedById.get(comment.id);
        if (!existing || (comment.createdAt || '') > (existing.createdAt || '')) {
          mergedById.set(comment.id, comment);
        }
      });

      return Array.from(mergedById.values()).sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
    }

    async function bootstrapComments() {
      const localComments = loadStoredComments();

      if (!filePath) {
        comments = localComments;
        activeCommentId = comments[0]?.id || null;
        commentsLoaded = true;
        renderComments();
        handleSelectionChange();
        return;
      }

      try {
        const response = await fetch('/comments?file=' + encodeURIComponent(filePath));
        const payload = response.ok
          ? await response.json()
          : await response.text().then(text => Promise.reject(new Error(text || 'Failed to load comments')));

        comments = mergeComments(payload.comments || [], localComments);
        activeCommentId = comments[0]?.id || null;
        commentsLoaded = true;
        renderComments();
        handleSelectionChange();
        persistComments({ silent: true }).then(() => {
          if (localComments.length) {
            showStatus('Comments synced to server.');
          }
        }).catch(() => {});
      } catch (error) {
        comments = localComments;
        activeCommentId = comments[0]?.id || null;
        commentsLoaded = true;
        renderComments();
        handleSelectionChange();
        if (comments.length) {
          showStatus('Comments loaded locally; server sync unavailable.', true);
        }
      }
    }

    function persistComments(options = {}) {
      const { silent = false } = options;
      const normalized = normalizeComments(comments);
      const serialized = JSON.stringify(normalized);
      localStorage.setItem(commentStorageKey, serialized);
      comments = normalized;

      if (!filePath || !commentsLoaded) {
        return Promise.resolve();
      }

      if (pendingCommentsSave) {
        return pendingCommentsSave;
      }

      const requestJson = serialized;
      pendingCommentsSave = fetch('/comments', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          filePath,
          comments: normalized
        })
      })
        .then(r => r.ok ? r.json() : r.text().then(text => Promise.reject(new Error(text || 'Failed to save comments'))))
        .then(payload => {
          if (!payload.success) {
            throw new Error(payload.error || 'Failed to save comments');
          }
          if (!silent) {
            showStatus(`Comments saved to ${payload.commentsPath}`);
          }
        })
        .catch(error => {
          showStatus(`Comment sync failed: ${error.message}`, true);
          throw error;
        })
        .finally(() => {
          pendingCommentsSave = null;
          if (JSON.stringify(normalizeComments(comments)) !== requestJson) {
            persistComments({ silent: true }).catch(() => {});
          }
        });

      return pendingCommentsSave;
    }

    function truncateText(text, maxLength = 180) {
      if (!text) {
        return '';
      }
      return text.length > maxLength ? `${text.slice(0, maxLength - 1)}…` : text;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function createCommentId() {
      return `comment-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
    }

    function getCurrentSelection() {
      const start = editor.selectionStart;
      const end = editor.selectionEnd;

      if (typeof start !== 'number' || typeof end !== 'number' || start === end) {
        return null;
      }

      return {
        start,
        end,
        text: editor.value.slice(start, end)
      };
    }

    function normalizeMarkdownBlockSource(raw) {
      const normalized = [];
      const map = [];
      const lines = raw.replace(/\r/g, '').split('\n');

      function appendChar(char, sourceIndex) {
        normalized.push(char);
        map.push(sourceIndex);
      }

      function appendInline(line, lineOffset, contentStart = 0, options = {}) {
        const { tableMode = false } = options;
        let i = contentStart;

        while (i < line.length) {
          if (tableMode && line[i] === '|') {
            i += 1;
            continue;
          }

          if (line.startsWith('**', i) || line.startsWith('__', i)) {
            i += 2;
            continue;
          }

          if (line[i] === '*' || line[i] === '_' || line[i] === '`') {
            i += 1;
            continue;
          }

          if (line[i] === '[') {
            const closeBracket = line.indexOf(']', i + 1);
            const openParen = closeBracket >= 0 ? line.indexOf('(', closeBracket) : -1;
            const closeParen = openParen >= 0 ? line.indexOf(')', openParen) : -1;
            if (closeBracket >= 0 && openParen === closeBracket + 1 && closeParen >= 0) {
              for (let j = i + 1; j < closeBracket; j += 1) {
                appendChar(line[j], lineOffset + j);
              }
              i = closeParen + 1;
              continue;
            }
          }

          appendChar(line[i], lineOffset + i);
          i += 1;
        }
      }

      let runningOffset = 0;
      lines.forEach((line, index) => {
        const trimmed = line.trim();
        let markerMatch = null;

        if (trimmed.startsWith('```')) {
          runningOffset += line.length + 1;
          if (index < lines.length - 1) {
            appendChar('\n', runningOffset - 1);
          }
          return;
        }

        if ((markerMatch = line.match(/^(\s*)(#{1,6})\s+/))) {
          appendInline(line, runningOffset, markerMatch[0].length);
        } else if ((markerMatch = line.match(/^(\s*)>\s?/))) {
          appendInline(line, runningOffset, markerMatch[0].length);
        } else if ((markerMatch = line.match(/^(\s*)([-*]|\d+(?:\.\d+)*\.?)\s+/))) {
          appendInline(line, runningOffset, markerMatch[0].length);
        } else if (trimmed.startsWith('|')) {
          if (!/^[\s|:-]+$/.test(trimmed)) {
            appendInline(line, runningOffset, 0, { tableMode: true });
          }
        } else if (!/^---+\s*$/.test(trimmed)) {
          appendInline(line, runningOffset, 0);
        }

        runningOffset += line.length + 1;
        if (index < lines.length - 1 && normalized.length) {
          appendChar('\n', runningOffset - 1);
        }
      });

      return {
        text: normalized.join(''),
        map
      };
    }

    function getSelectionOffsetWithinBlock(blockElement, container, offset) {
      const doc = blockElement.ownerDocument;
      const range = doc.createRange();
      range.selectNodeContents(blockElement);
      range.setEnd(container, offset);
      return range.toString().length;
    }

    function sourceOffsetFromNormalizedOffset(map, normalizedOffset, rawLength) {
      if (!map.length) {
        return 0;
      }
      if (normalizedOffset <= 0) {
        return map[0];
      }
      if (normalizedOffset >= map.length) {
        return rawLength;
      }
      return map[normalizedOffset];
    }

    function getSourceBlockElement(node) {
      if (!node) {
        return null;
      }
      if (node.nodeType === Node.ELEMENT_NODE) {
        return node.closest('[data-source-start]');
      }
      return node.parentElement ? node.parentElement.closest('[data-source-start]') : null;
    }

    function resolvePreviewSelectionFromRange(range) {
      if (!range || range.collapsed) {
        return null;
      }

      const startBlock = getSourceBlockElement(range.startContainer);
      const endBlock = getSourceBlockElement(range.endContainer);

      if (!startBlock || !endBlock) {
        return null;
      }

      const sourceBlocks = Array.from(range.commonAncestorContainer.ownerDocument.querySelectorAll('[data-source-start]'))
        .filter(block => range.intersectsNode(block))
        .sort((a, b) => Number(a.dataset.sourceStart) - Number(b.dataset.sourceStart));

      if (!sourceBlocks.length) {
        return null;
      }

      const firstBlock = sourceBlocks[0];
      const lastBlock = sourceBlocks[sourceBlocks.length - 1];

      const firstStart = Number(firstBlock.dataset.sourceStart);
      const firstEnd = Number(firstBlock.dataset.sourceEnd);
      const lastStart = Number(lastBlock.dataset.sourceStart);
      const lastEnd = Number(lastBlock.dataset.sourceEnd);

      const firstRaw = editor.value.slice(firstStart, firstEnd);
      const lastRaw = editor.value.slice(lastStart, lastEnd);
      const firstNormalized = normalizeMarkdownBlockSource(firstRaw);
      const lastNormalized = normalizeMarkdownBlockSource(lastRaw);

      const selectionStartInFirst = getSelectionOffsetWithinBlock(firstBlock, range.startContainer, range.startOffset);
      const selectionEndInLast = getSelectionOffsetWithinBlock(lastBlock, range.endContainer, range.endOffset);

      const sourceStart = firstStart + sourceOffsetFromNormalizedOffset(firstNormalized.map, selectionStartInFirst, firstRaw.length);
      const sourceEnd = lastStart + sourceOffsetFromNormalizedOffset(lastNormalized.map, selectionEndInLast, lastRaw.length);

      if (!Number.isInteger(sourceStart) || !Number.isInteger(sourceEnd) || sourceEnd <= sourceStart) {
        return null;
      }

      return {
        start: sourceStart,
        end: sourceEnd,
        text: editor.value.slice(sourceStart, sourceEnd),
        previewText: range.toString(),
        origin: 'preview'
      };
    }

    function handlePreviewSelectionChange() {
      const previewDoc = styledPreview.contentDocument;
      const selection = previewDoc?.getSelection ? previewDoc.getSelection() : null;

      if (!selection || selection.rangeCount === 0 || selection.isCollapsed) {
        return;
      }

      const resolved = resolvePreviewSelectionFromRange(selection.getRangeAt(0));
      if (!resolved) {
        return;
      }

      currentSelection = resolved;
      selectionCard.classList.remove('empty');
      selectionPreview.textContent = resolved.previewText || resolved.text;
      applySelectionBtn.disabled = false;
    }

    function bindStyledPreviewSelectionCapture() {
      const previewDoc = styledPreview.contentDocument;
      if (!previewDoc) {
        return;
      }

      if (previewSelectionFrame && previewSelectionListener) {
        previewSelectionFrame.removeEventListener('mouseup', previewSelectionListener, true);
        previewSelectionFrame.removeEventListener('keyup', previewSelectionListener, true);
        previewSelectionFrame.removeEventListener('selectionchange', previewSelectionListener, true);
      }

      previewSelectionFrame = previewDoc;
      previewSelectionListener = () => {
        handlePreviewSelectionChange();
      };

      previewDoc.addEventListener('mouseup', previewSelectionListener, true);
      previewDoc.addEventListener('keyup', previewSelectionListener, true);
      previewDoc.addEventListener('selectionchange', previewSelectionListener, true);
    }

    function snapshotEditorSelection() {
      const selection = getCurrentSelection();
      if (selection) {
        lastEditorSelection = selection;
        currentSelection = selection;
      }
      return selection;
    }

    function handleSelectionChange(force = false) {
      const selection = snapshotEditorSelection();

      if (selection) {
        currentSelection = selection;
      } else if (force && document.activeElement === editor) {
        currentSelection = null;
      } else if (!currentSelection) {
        currentSelection = lastEditorSelection;
      }

      if (!currentSelection) {
        selectionCard.classList.add('empty');
        selectionPreview.textContent = 'Select text in the editor to attach a comment.';
        applySelectionBtn.disabled = !activeCommentId;
        return;
      }

      selectionCard.classList.remove('empty');
      selectionPreview.textContent = currentSelection.previewText || currentSelection.text;
      applySelectionBtn.disabled = false;
    }

    function handleEditorBlur() {
      snapshotEditorSelection();
      handleSelectionChange();
    }

    function isCommentStale(comment) {
      if (!comment) {
        return false;
      }

      if (comment.start < 0 || comment.end > editor.value.length || comment.start >= comment.end) {
        return true;
      }

      return editor.value.slice(comment.start, comment.end) !== comment.excerpt;
    }

    function renderComments() {
      if (!comments.length) {
        commentsList.innerHTML = '<div class="comment-empty">No comments yet.</div>';
        applySelectionBtn.disabled = !currentSelection;
        return;
      }

      commentsList.innerHTML = comments.map((comment, index) => {
        const isActive = comment.id === activeCommentId;
        const stale = isCommentStale(comment);
        const createdAt = comment.createdAt ? new Date(comment.createdAt).toLocaleString() : '';
        const excerpt = stale ? (comment.excerpt || '') : (editor.value.slice(comment.start, comment.end) || comment.excerpt || '');
        const pending = pendingApplyCommentId === comment.id;
        return `
          <div class="comment-item${isActive ? ' active' : ''}${stale ? ' stale' : ''}">
            <div class="comment-meta">
              <strong>Comment ${index + 1}</strong>
              <span>${createdAt}</span>
            </div>
            ${stale ? '<div class="comment-state">Needs re-anchor after edits</div>' : ''}
            <div class="comment-quote">${escapeHtml(truncateText(excerpt, 220))}</div>
            <div class="comment-body">${escapeHtml(comment.comment)}</div>
            <div class="comment-buttons">
              <button type="button" class="secondary" onclick="focusCommentRange('${comment.id}')">Focus</button>
              <button type="button" class="secondary" onclick="resolveComment('${comment.id}')">Resolve</button>
              <button type="button" onclick="applyCommentWithAI('${comment.id}')" ${(pending || stale) ? 'disabled' : ''}>${pending ? 'Applying...' : 'AI Apply'}</button>
              <button type="button" class="accent" onclick="deleteComment('${comment.id}')">Delete</button>
            </div>
          </div>
        `;
      }).join('');

      applySelectionBtn.disabled = !currentSelection && !activeCommentId;
    }

    function addComment() {
      const selection = lastEditorSelection || currentSelection;
      const commentText = commentInput.value.trim();

      if (!selection) {
        showStatus('Select text before adding a comment.', true);
        return;
      }

      if (!commentText) {
        showStatus('Enter a comment first.', true);
        return;
      }

      const comment = {
        id: createCommentId(),
        start: selection.start,
        end: selection.end,
        excerpt: selection.text,
        comment: commentText,
        createdAt: new Date().toISOString()
      };

      comments.unshift(comment);
      activeCommentId = comment.id;
      currentSelection = selection;
      lastEditorSelection = selection;
      commentInput.value = '';
      persistComments({ silent: true });
      renderComments();
      showStatus('Comment added.');
    }

    function focusCommentRange(commentId) {
      const comment = comments.find(item => item.id === commentId);
      if (!comment) {
        return;
      }

      if (isCommentStale(comment)) {
        activeCommentId = commentId;
        renderComments();
        showStatus('This comment no longer matches the current text. Re-select the passage and add a fresh comment, or resolve it.', true);
        return;
      }

      activeCommentId = commentId;
      editor.focus();
      editor.setSelectionRange(comment.start, comment.end);
      lastEditorSelection = {
        start: comment.start,
        end: comment.end,
        text: editor.value.slice(comment.start, comment.end)
      };
      handleSelectionChange();
      renderComments();
    }

    function deleteComment(commentId) {
      comments = comments.filter(comment => comment.id !== commentId);
      if (activeCommentId === commentId) {
        activeCommentId = comments[0]?.id || null;
      }
      persistComments({ silent: true });
      renderComments();
      showStatus('Comment removed.');
    }

    function resolveComment(commentId) {
      comments = comments.filter(comment => comment.id !== commentId);
      if (activeCommentId === commentId) {
        activeCommentId = comments[0]?.id || null;
      }
      persistComments({ silent: true });
      renderComments();
      showStatus('Comment resolved.');
    }

    function syncCommentsAfterEdit() {
      persistComments({ silent: true });
      renderComments();
    }

    function getCommentForApply(commentId = null) {
      if (commentId) {
        return comments.find(comment => comment.id === commentId) || null;
      }

      if (currentSelection) {
        const exactMatch = comments.find(comment => (
          comment.start === currentSelection.start &&
          comment.end === currentSelection.end
        ));
        if (exactMatch) {
          return exactMatch;
        }
      }

      return comments.find(comment => comment.id === activeCommentId) || null;
    }

    function applyActiveCommentWithAI() {
      const comment = getCommentForApply();
      if (!comment) {
        showStatus('Add a comment or select a saved comment first.', true);
        return;
      }
      applyCommentWithAI(comment.id);
    }

    function applyCommentWithAI(commentId) {
      const comment = comments.find(item => item.id === commentId);
      if (!comment) {
        showStatus('Comment not found.', true);
        return;
      }

      if (isCommentStale(comment)) {
        showStatus('The text changed. Re-select it and add a fresh comment.', true);
        renderComments();
        return;
      }

      pendingApplyCommentId = commentId;
      activeCommentId = commentId;
      renderComments();

      fetch('/ai-address-comment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          filePath,
          fullText: editor.value,
          selectionStart: comment.start,
          selectionEnd: comment.end,
          selectedText: comment.excerpt,
          comment: comment.comment,
          provider: aiProviderSelect.value || 'mlx',
          model: aiModelSelect.value || ''
        })
      })
      .then(async response => {
        const payload = await response.json().catch(() => null);
        if (!response.ok || !payload?.success) {
          throw new Error(payload?.error || 'AI apply failed');
        }
        return payload;
      })
      .then(payload => {
        const before = editor.value.slice(0, comment.start);
        const after = editor.value.slice(comment.end);
        editor.value = `${before}${payload.replacementText}${after}`;
        const newEnd = comment.start + payload.replacementText.length;

        comments = comments.filter(item => item.id !== commentId);
        activeCommentId = comments[0]?.id || null;
        persistComments({ silent: true });
        renderComments();
        updatePreview();
        schedulePdfEstimate();

        editor.focus();
        editor.setSelectionRange(comment.start, newEnd);
        handleSelectionChange();
        showStatus('Comment applied with AI.');
      })
      .catch(error => {
        showStatus(error.message, true);
      })
      .finally(() => {
        pendingApplyCommentId = null;
        renderComments();
      });
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 's') {
        e.preventDefault();
        saveFile();
      }
      if ((e.metaKey || e.ctrlKey) && e.key === 'p') {
        e.preventDefault();
        generatePDF();
      }
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        applyActiveCommentWithAI();
      }
    });

    // Re-render on template change
    templateSelect.addEventListener('change', () => {
      updatePreview();
      schedulePdfEstimate();
    });

    aiProviderSelect.addEventListener('change', () => {
      renderAiModelOptions();
    });

    styledPreview.addEventListener('load', () => {
      bindStyledPreviewSelectionCapture();
    });

    document.addEventListener('mousedown', (event) => {
      if (document.activeElement === editor && !editor.contains(event.target)) {
        snapshotEditorSelection();
      }
    }, true);

    document.addEventListener('selectionchange', () => {
      if (document.activeElement === editor && editor.selectionStart !== editor.selectionEnd) {
        handleSelectionChange();
      }
    });
  </script>
</body>
</html>
