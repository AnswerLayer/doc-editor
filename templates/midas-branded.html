<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{title}} - Midas Labs</title>
  <style>
    @font-face {
      font-family: 'Mona Sans';
      font-style: normal;
      font-weight: 200 900;
      font-stretch: 75% 125%;
      font-display: swap;
      src: url('https://midaslabs.ca/_next/static/media/Mona-Sans.var.37e1d48f.woff2') format('woff2');
    }

    :root {
      --neutral-950: #0a0a0a;
      --neutral-900: #171717;
      --neutral-800: #262626;
      --neutral-700: #404040;
      --neutral-600: #525252;
      --neutral-500: #737373;
      --neutral-300: #d4d4d4;
      --neutral-200: #e5e5e5;
      --neutral-100: #f5f5f5;
      --neutral-50: #fafafa;
      --white: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    @page {
      size: letter;
      margin: 0.55in;
    }

    body {
      font-family: 'Mona Sans', ui-sans-serif, system-ui, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(0, 0, 0, 0.035), transparent 28%),
        linear-gradient(180deg, var(--neutral-50), #ffffff 36%);
      color: var(--neutral-700);
      font-size: 11px;
      line-height: 1.6;
      padding: 22px;
      max-width: 8.5in;
    }

    .page-shell {
      position: relative;
    }

    .page-shell::before {
      content: "";
      position: absolute;
      inset: 118px 0 auto auto;
      width: 210px;
      height: 210px;
      opacity: 0.35;
      background-image:
        linear-gradient(to right, rgba(10, 10, 10, 0.07) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(10, 10, 10, 0.07) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: linear-gradient(to bottom left, black 48%, transparent 88%);
      pointer-events: none;
    }

    .hero {
      position: relative;
      overflow: hidden;
      background: var(--neutral-950);
      color: var(--white);
      border-radius: 40px;
      padding: 30px 32px 28px;
      margin-bottom: 26px;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.06), transparent 42%),
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.12), transparent 28%);
      pointer-events: none;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -34px;
      top: -24px;
      width: 220px;
      height: 220px;
      opacity: 0.18;
      background-image:
        linear-gradient(to right, rgba(255, 255, 255, 0.35) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.35) 1px, transparent 1px);
      background-size: 40px 40px;
      transform: rotate(14deg);
      pointer-events: none;
    }

    .hero-top {
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
      margin-bottom: 28px;
      z-index: 1;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark {
      width: 146px;
      height: auto;
      flex: none;
    }

    .brand-copy {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .eyebrow {
      font-size: 9px;
      line-height: 1.4;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.72);
    }

    .meta {
      max-width: 220px;
      text-align: right;
      font-size: 10px;
      line-height: 1.65;
      color: rgba(255, 255, 255, 0.74);
    }

    .meta strong {
      color: var(--white);
      font-weight: 600;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 620px;
    }

    h1 {
      font-size: 30px;
      line-height: 1.04;
      font-weight: 600;
      letter-spacing: -0.04em;
      color: var(--white);
      margin: 0;
      text-wrap: balance;
      break-after: avoid;
      page-break-after: avoid;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .content-card {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(10, 10, 10, 0.08);
      border-radius: 32px;
      padding: 28px 30px;
      box-shadow: 0 1px 0 rgba(10, 10, 10, 0.05);
    }

    h2 {
      font-size: 19px;
      line-height: 1.2;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: var(--neutral-950);
      margin-top: 34px;
      margin-bottom: 14px;
      break-after: avoid;
      page-break-after: avoid;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    h2:first-child {
      margin-top: 0;
    }

    h3 {
      font-size: 14px;
      line-height: 1.3;
      font-weight: 600;
      color: var(--neutral-950);
      margin-top: 22px;
      margin-bottom: 10px;
      break-after: avoid;
      page-break-after: avoid;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    p {
      margin-bottom: 12px;
      color: var(--neutral-700);
      orphans: 3;
      widows: 3;
    }

    strong {
      font-weight: 600;
      color: var(--neutral-950);
    }

    a {
      color: var(--neutral-950);
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 0.15em;
    }

    ul, ol {
      margin: 14px 0 16px;
      padding-left: 0;
      list-style: none;
    }

    li > ul,
    li > ol {
      margin-top: 8px;
      margin-bottom: 0;
      margin-left: 16px;
    }

    li {
      position: relative;
      margin-bottom: 10px;
      padding-left: 22px;
      color: var(--neutral-700);
      orphans: 3;
      widows: 3;
    }

    ul li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.78em;
      width: 9px;
      height: 1px;
      background: var(--neutral-950);
    }

    li > ul li::before {
      width: 10px;
      opacity: 0.6;
    }

    ol {
      counter-reset: item;
    }

    ol li {
      counter-increment: item;
    }

    ol li::before {
      content: counter(item, decimal-leading-zero);
      position: absolute;
      left: 0;
      top: 0;
      font-size: 9px;
      line-height: 1.8;
      letter-spacing: 0.08em;
      font-weight: 600;
      color: var(--neutral-500);
    }

    ol li[data-marker]::before {
      content: attr(data-marker);
      letter-spacing: 0;
      font-size: 10px;
      line-height: 1.65;
    }

    blockquote {
      margin: 22px 0;
      padding: 20px 24px;
      background: var(--neutral-50);
      border-radius: 28px;
      border: 1px solid rgba(10, 10, 10, 0.08);
      position: relative;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    blockquote::before {
      content: "";
      position: absolute;
      left: 24px;
      top: 0;
      width: 26px;
      height: 1px;
      background: var(--neutral-950);
    }

    blockquote p {
      font-size: 14px;
      line-height: 1.55;
      color: var(--neutral-950);
      margin: 0;
    }

    hr {
      border: none;
      height: 1px;
      background: linear-gradient(to right, var(--neutral-950), rgba(10, 10, 10, 0.08));
      margin: 28px 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 18px 0;
      font-size: 10px;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    thead {
      display: table-header-group;
    }

    tr {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    th, td {
      text-align: left;
      padding: 10px 12px;
      vertical-align: top;
    }

    th {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--neutral-950);
      border-bottom: 1px solid var(--neutral-950);
    }

    td {
      color: var(--neutral-700);
      border-bottom: 1px solid rgba(10, 10, 10, 0.09);
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      background: var(--neutral-100);
      color: var(--neutral-950);
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 10px;
      font-weight: 600;
    }

    pre {
      margin: 20px 0;
      background: var(--neutral-950);
      color: var(--white);
      border-radius: 28px;
      overflow-x: auto;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    pre code {
      display: block;
      background: none;
      color: inherit;
      border-radius: 0;
      padding: 20px 22px;
      font-size: 10px;
      line-height: 1.7;
      font-weight: 500;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .footer {
      margin-top: 18px;
      padding: 0 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      color: var(--neutral-500);
      font-size: 9px;
      line-height: 1.4;
    }

    .footer-mark {
      width: 116px;
      height: auto;
      opacity: 0.92;
    }

    #footer-meta {
      text-align: right;
    }
  </style>
</head>
