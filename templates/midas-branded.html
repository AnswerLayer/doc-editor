  <style>
    @font-face {
      font-family: 'Mona Sans';
      font-style: normal;
      font-weight: 200 900;
      font-stretch: 75% 125%;
      font-display: swap;
      src: url('https://midaslabs.ca/_next/static/media/Mona-Sans.var.37e1d48f.woff2') format('woff2');
    }

    :root {
      --ink: #111111;
      --muted: #444444;
      --rule: #7a7a7a;
      --page-width: 8.5in;
      --page-padding-top: 0.05in;
      --page-padding-x: 0.72in;
      --page-padding-bottom: 0.72in;
      --content-width: 6.1in;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    @page {
      size: letter;
      margin: 0.55in 0.72in 0.72in;
    }

    body {
      font-family: 'Mona Sans', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink);
      background: #ffffff;
      font-size: 12.5px;
      line-height: 1.42;
      -webkit-font-smoothing: antialiased;
      width: var(--page-width);
      max-width: 100%;
      margin: 0 auto;
    }

    .document {
      width: 100%;
      min-height: 11in;
      padding: var(--page-padding-top) var(--page-padding-x) var(--page-padding-bottom);
    }

    .brand-lockup {
      width: 156px;
      height: auto;
      display: block;
      margin-left: auto;
    }

    .cover {
      position: relative;
      min-height: calc(11in - var(--page-padding-top) - var(--page-padding-bottom));
      page-break-after: always;
      break-after: page;
    }

    .cover-title {
      margin-top: 2.55in;
      margin-left: 0.03in;
      max-width: 5.7in;
    }

    h1 {
      font-size: 28px;
      line-height: 1.12;
      font-weight: 500;
      letter-spacing: -0.03em;
      color: var(--ink);
    }

    .cover-meta {
      position: absolute;
      right: 0.08in;
      bottom: 1.02in;
      width: 2.15in;
      text-align: left;
      font-size: 12px;
      line-height: 1.42;
      color: var(--ink);
    }

    .cover-meta strong {
      font-weight: 600;
    }

    .body-page {
      padding-top: 0.02in;
    }

    .body-header {
      margin-bottom: 0.34in;
    }

    .content {
      width: var(--content-width);
      margin-left: 0;
      color: var(--ink);
    }

    h2 {
      font-size: 17px;
      line-height: 1.24;
      font-weight: 600;
      color: var(--ink);
      margin-top: 0.34in;
      margin-bottom: 0.16in;
      break-after: avoid;
      page-break-after: avoid;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    h2:first-child {
      margin-top: 0;
    }

    h3 {
      font-size: 13px;
      line-height: 1.3;
      font-weight: 600;
      margin-top: 0.24in;
      margin-bottom: 0.09in;
      color: var(--ink);
      break-after: avoid;
      page-break-after: avoid;
    }

    h4 {
      font-size: 12.5px;
      line-height: 1.32;
      font-weight: 600;
      margin-top: 0.18in;
      margin-bottom: 0.08in;
      color: var(--ink);
      break-after: avoid;
      page-break-after: avoid;
    }

    p {
      margin: 0 0 0.16in;
      color: var(--ink);
      orphans: 3;
      widows: 3;
    }

    strong {
      font-weight: 700;
      color: var(--ink);
    }

    em {
      font-style: italic;
    }

    a {
      color: var(--ink);
      text-decoration: underline;
      text-underline-offset: 0.14em;
      text-decoration-thickness: 1px;
    }

    ul,
    ol {
      margin: 0.05in 0 0.18in 0.22in;
      padding-left: 0.18in;
    }

    li {
      margin-bottom: 0.08in;
      color: var(--ink);
    }

    li > ul,
    li > ol {
      margin-top: 0.08in;
      margin-bottom: 0.02in;
    }

    blockquote {
      margin: 0.22in 0;
      padding-left: 0.16in;
      border-left: 2px solid var(--rule);
      color: var(--muted);
    }

    blockquote p:last-child {
      margin-bottom: 0;
    }

    hr {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 0.22in 0 0.24in;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 0.12in 0 0.28in;
      font-size: 12px;
      line-height: 1.32;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    thead {
      display: table-header-group;
    }

    tr {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    th,
    td {
      border: 1px solid var(--rule);
      padding: 7px 9px;
      text-align: left;
      vertical-align: top;
      color: var(--ink);
    }

    th {
      background: #000000;
      color: #ffffff;
      font-size: 12px;
      font-weight: 700;
    }

    td:first-child {
      width: 2.2in;
      font-weight: 700;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 11px;
      background: #f3f3f3;
      border: 1px solid #dddddd;
      border-radius: 3px;
      padding: 1px 4px;
    }

    pre {
      margin: 0.18in 0 0.26in;
      padding: 0.14in 0.16in;
      border: 1px solid #d7d7d7;
      background: #fafafa;
      overflow-x: auto;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    pre code {
      display: block;
      padding: 0;
      border: none;
      background: transparent;
      border-radius: 0;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.45;
    }
  </style>
