<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{title}} - AnswerLayer</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy-900: #151c3f;
      --navy-700: #2a3477;
      --navy-600: #384393;
      --navy-500: #4a57b4;
      --navy-400: #6275c7;
      --navy-300: #8997d6;
      --navy-100: #dbe1f3;
      --navy-50: #eef1fa;
      --background: #f8f9fc;
      --foreground: #0f172a;
      --gray-300: #dee2e6;
      --gray-500: #adb5bd;
      --gray-600: #868e96;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    @page {
      size: letter;
      margin: 0.5in 0.6in;
    }

    body {
      font-family: 'Space Mono', monospace;
      background: white;
      color: var(--foreground);
      line-height: 1.5;
      font-size: 11px;
      padding: 40px;
      max-width: 8.5in;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 3px solid var(--navy-900);
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 40px;
      height: 40px;
    }

    .company-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--navy-900);
    }

    .meta {
      text-align: right;
      font-size: 10px;
      color: var(--gray-600);
      line-height: 1.6;
    }

    .meta strong {
      color: var(--navy-900);
    }

    /* Typography */
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      color: var(--navy-900);
      margin-bottom: 8px;
      margin-top: 0;
    }

    h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--navy-600);
      margin-top: 24px;
      margin-bottom: 10px;
      padding-bottom: 4px;
      border-bottom: 2px solid var(--navy-300);
    }

    h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: var(--navy-900);
      margin-top: 16px;
      margin-bottom: 8px;
    }

    p {
      font-size: 11px;
      line-height: 1.55;
      margin-bottom: 10px;
    }

    strong {
      color: var(--navy-700);
    }

    /* Lists */
    ul, ol {
      margin-bottom: 12px;
      padding-left: 0;
      list-style: none;
    }

    li {
      font-size: 11px;
      padding-left: 18px;
      position: relative;
      margin-bottom: 6px;
      line-height: 1.5;
    }

    li::before {
      content: "›";
      position: absolute;
      left: 0;
      color: var(--navy-500);
      font-weight: 700;
    }

    ol { counter-reset: item; }
    ol li { counter-increment: item; }
    ol li::before {
      content: counter(item) ".";
      color: var(--navy-500);
      font-weight: 600;
    }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10px;
      margin: 12px 0;
    }

    th, td {
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid var(--gray-300);
    }

    th {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--navy-600);
      background: var(--navy-50);
      border-bottom: 2px solid var(--navy-900);
    }

    /* Horizontal rules become section breaks */
    hr {
      border: none;
      border-top: 1px solid var(--gray-300);
      margin: 20px 0;
    }

    /* Blockquotes become highlight boxes */
    blockquote {
      background: var(--navy-900);
      color: white;
      padding: 14px 18px;
      margin: 16px 0;
      border: none;
    }

    blockquote p {
      font-size: 12px;
      font-weight: 500;
      margin: 0;
      color: white;
    }

    blockquote strong {
      color: white;
    }

    /* Code blocks for callouts */
    code {
      font-family: 'Space Mono', monospace;
      background: var(--navy-50);
      padding: 2px 6px;
      font-size: 10px;
      border-radius: 2px;
    }

    pre {
      background: var(--navy-50);
      border-left: 3px solid var(--navy-600);
      padding: 12px 16px;
      margin: 12px 0;
      font-size: 11px;
      overflow-x: auto;
    }

    pre code {
      background: none;
      padding: 0;
    }

    /* Footer */
    .footer {
      margin-top: 32px;
      padding-top: 12px;
      border-top: 1px solid var(--gray-300);
      font-size: 10px;
      color: var(--gray-600);
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
