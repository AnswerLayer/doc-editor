<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{title}} - AnswerLayer</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy-900: #151c3f;
      --navy-700: #2a3477;
      --navy-600: #384393;
      --gray-700: #495057;
      --gray-500: #adb5bd;
      --gray-300: #dee2e6;
      --gray-100: #f8f9fa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    @page {
      size: letter;
      margin: 1in 1in;
    }

    body {
      font-family: 'Source Serif 4', Georgia, serif;
      background: white;
      color: var(--gray-700);
      line-height: 1.6;
      font-size: 11pt;
      padding: 40px 60px;
      max-width: 8.5in;
      position: relative;
    }

    /* Draft watermark */
    body::before {
      content: "DRAFT";
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-45deg);
      font-size: 120pt;
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 700;
      color: rgba(0, 0, 0, 0.04);
      pointer-events: none;
      z-index: -1;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--gray-300);
    }

    /* Typography */
    h1 {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 18pt;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--navy-900);
      margin-bottom: 16px;
      margin-top: 0;
    }

    h2 {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 12pt;
      font-weight: 700;
      color: var(--navy-900);
      margin-top: 28px;
      margin-bottom: 12px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--gray-300);
    }

    h3 {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 11pt;
      font-weight: 600;
      color: var(--navy-700);
      margin-top: 20px;
      margin-bottom: 8px;
    }

    p {
      font-size: 11pt;
      line-height: 1.65;
      margin-bottom: 12px;
      text-align: justify;
    }

    strong {
      font-weight: 600;
      color: var(--navy-900);
    }

    /* Preamble styling */
    p:first-of-type {
      font-style: italic;
      color: var(--gray-500);
      text-align: center;
      font-size: 10pt;
    }

    /* Lists */
    ul, ol {
      margin-bottom: 12px;
      padding-left: 24px;
    }

    li {
      font-size: 11pt;
      margin-bottom: 6px;
      line-height: 1.6;
    }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10pt;
      margin: 16px 0;
    }

    th, td {
      text-align: left;
      padding: 10px 12px;
      border: 1px solid var(--gray-300);
    }

    th {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 9pt;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: var(--navy-700);
      background: var(--gray-100);
    }

    /* Horizontal rules */
    hr {
      border: none;
      border-top: 1px solid var(--gray-300);
      margin: 24px 0;
    }

    /* Blockquotes for callouts */
    blockquote {
      background: var(--gray-100);
      border-left: 3px solid var(--navy-600);
      padding: 12px 16px;
      margin: 16px 0;
      font-style: italic;
    }

    blockquote p {
      font-style: italic;
      margin: 0;
      text-align: left;
    }

    /* Code for inline references */
    code {
      font-family: 'Courier New', monospace;
      background: var(--gray-100);
      padding: 2px 5px;
      font-size: 10pt;
      border-radius: 2px;
    }

    /* Signature blocks */
    .signature-section {
      margin-top: 48px;
      page-break-inside: avoid;
    }

    /* Footer */
    .footer {
      margin-top: 48px;
      padding-top: 16px;
      border-top: 1px solid var(--gray-300);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 9pt;
      color: var(--gray-500);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header"></div>

  <div id="content">
    {{content}}
  </div>

  <div class="footer">
    <span>Confidential — For Discussion Purposes Only</span>
  </div>
</body>
</html>
